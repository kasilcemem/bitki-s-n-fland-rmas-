<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kaş AI Professional</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:#fff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.app{
width:100%;
max-width:900px;
height:100vh;
display:flex;
flex-direction:column;
background:#111827;
}

header{
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
background:linear-gradient(90deg,#2563eb,#06b6d4);
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
scroll-behavior:smooth;
}

.msg{
padding:14px;
margin:10px 0;
border-radius:14px;
max-width:82%;
line-height:1.5;
word-wrap:break-word;
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#374151;
}

footer{
display:flex;
gap:10px;
padding:12px;
background:#1f2937;
}

input{
flex:1;
padding:14px;
font-size:16px;
border:none;
outline:none;
border-radius:12px;
}

button{
padding:14px 22px;
border:none;
border-radius:12px;
background:#22c55e;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}
</style>
</head>
<body>

<div class="app">

<header>🤖 Kaş AI Professional</header>

<div id="chat"></div>

<footer>
<input id="input" placeholder="Sorunu yaz..." />
<button onclick="sendMsg()">Gönder</button>
</footer>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

function addMsg(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function answerQuestion(q){

q=q.toLowerCase().trim();

if(q.includes("merhaba")) return "Merhaba 👋 Sana nasıl yardımcı olabilirim?";
if(q.includes("nasılsın")) return "Gayet iyiyim, çalışmaya hazırım 😎";
if(q.includes("adın ne")) return "Ben Kaş AI Professional.";

if(q.includes("izmir")) return "İzmir, Türkiye'nin Ege Bölgesi'nde bulunan büyük bir sahil şehridir. Kordon, Alsancak ve tarihi Agora ile ünlüdür.";
if(q.includes("ankara")) return "Ankara Türkiye'nin başkentidir ve İç Anadolu Bölgesi'ndedir.";
if(q.includes("istanbul")) return "İstanbul, Türkiye'nin en kalabalık şehridir ve iki kıtaya yayılmıştır.";

if(q.includes("türkiye")) return "Türkiye, Avrupa ile Asya arasında yer alan tarihi ve stratejik öneme sahip bir ülkedir.";

if(q.includes("html")) return "HTML, web sitelerinin yapısını kuran işaretleme dilidir.";
if(q.includes("css")) return "CSS, web sitelerinin görünümünü ve tasarımını düzenler.";
if(q.includes("javascript")) return "JavaScript, web sitelerine hareket ve etkileşim kazandırır.";

if(q.includes("python")) return "Python, öğrenmesi kolay ve güçlü bir programlama dilidir.";
if(q.includes("java")) return "Java, büyük sistemlerde ve Android geliştirmede yaygın kullanılan bir dildir.";

if(q.includes("yapay zeka")) return "Yapay zeka, verilerden öğrenerek karar verebilen bilgisayar sistemleridir.";

if(q.includes("dünya kaç yaşında")) return "Bilimsel tahminlere göre Dünya yaklaşık 4.54 milyar yaşındadır.";
if(q.includes("güneş")) return "Güneş, Güneş Sistemi'nin merkezindeki yıldızdır.";
if(q.includes("ay")) return "Ay, Dünya'nın tek doğal uydusudur.";

if(q.includes("2+2")) return "2 + 2 = 4";
if(q.includes("3+5")) return "3 + 5 = 8";
if(q.includes("10x10")) return "10 x 10 = 100";

if(q.includes("üzgün")) return "Zor zamanlar geçici olabilir. Kendine biraz şefkat göstermeyi unutma.";
if(q.includes("yalnız")) return "Yalnız hissettiğinde bile değerli olduğunu unutma.";
if(q.includes("mutlu")) return "Mutluluk çoğu zaman küçük anlarda gizlidir.";

if(q.includes("saat")) return "Bulunduğun cihazın saatine bakarak güncel zamanı görebilirsin.";

if(q.endsWith("?")) return "Bu güzel bir soru. Daha detay verirsen daha net cevaplayabilirim.";

return "Sorunu anladım. Daha açık yazarsan sana daha profesyonel yardımcı olabilirim.";
}

function sendMsg(){

let text=input.value.trim();
if(text==="") return;

addMsg(text,"user");
input.value="";

let loading=document.createElement("div");
loading.className="msg ai";
loading.innerText="Analiz ediliyor...";
chat.appendChild(loading);
chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{
loading.remove();
addMsg(answerQuestion(text),"ai");
},300);
}

input.addEventListener("keypress",function(e){
if(e.key==="Enter") sendMsg();
});

addMsg("🤖 Kaş AI Professional hazır. Bana soru sorabilirsin.","ai");
</script>

</body>
</html>
