<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kaş AI Ultra</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:15px;
}

.msg{
padding:12px;
margin:8px 0;
border-radius:12px;
max-width:80%;
word-wrap:break-word;
line-height:1.4;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#374151;
}

footer{
display:flex;
padding:10px;
background:#111827;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
opacity:.9;
}
</style>
</head>
<body>

<header>🤖 Kaş AI Ultra</header>

<div id="chat"></div>

<footer>
<input id="input" placeholder="Bir şey yaz..." onkeypress="if(event.key==='Enter')sendMsg()">
<button onclick="sendMsg()">Gönder</button>
</footer>

<script type="module">
import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

const chat = document.getElementById("chat");
const input = document.getElementById("input");

let engine;

function add(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

add("Yapay zeka yükleniyor... İlk açılış 1-2 dk sürebilir 🚀","ai");

async function loadAI(){
engine = await CreateMLCEngine(
"Qwen2.5-0.5B-Instruct-q4f16_1-MLC",
{
initProgressCallback: (p)=> {
console.log(p);
}
}
);

add("Gerçek güçlü yapay zeka hazır 😎","ai");
}

loadAI();

async function sendMsg(){

let text=input.value.trim();
if(!text) return;

add(text,"user");
input.value="";

add("Düşünüyorum...","ai");

const reply = await engine.chat.completions.create({
messages:[
{role:"system",content:"Sen yardımsever güçlü Türkçe konuşan yapay zekasın."},
{role:"user",content:text}
]
});

chat.lastChild.remove();

add(reply.choices[0].message.content,"ai");
}
</script>

</body>
</html>
